site_name: IHC - Grupo 02
site_url: https://Interacao-Humano-Computador.github.io/2026.1-Grupo02
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo02
repo_name: 2026.1-Grupo02

plugins:
  - search
  - mermaid2

theme:
  name: material
  language: pt
  logo: img/site_logo.png
  favicon: img/site_logo.png
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

nav:
  - Inicio: index.md
  - Planejamento:
      - Cronograma: Planejamento/cronograma.md
      - Heatmap: Planejamento/heatmap.md
      - Ferramentas: Planejamento/ferramentas.md
      - Processo de Design: Planejamento/Processo_Design.md
      - Sites Analisados: Planejamento/sites_analisados.md
      - Site Selecionado: Planejamento/site_selecionado.md
  - Análise de Requisitos:
      - Perfil de Usuário: Analise de Requisitos/PerfilDeUsuario.md
      - Aspectos Éticos: Analise de Requisitos/AspectosEticos.md
      - Cenários: Analise de Requisitos/Cenario/cenario_unificado.md
      - Personas:
          - Persona 1: Analise de Requisitos/Personas/persona_LucasMendes.md
          - Persona 3: Analise de Requisitos/Personas/persona_RafaelMendonca.md
          - Persona 4: Analise de Requisitos/Personas/persona_karina.md
          - Persona 5: Analise de Requisitos/Personas/persona_FelixRyan.md
          - Persona 6: Analise de Requisitos/Personas/persona_fernanda.md
