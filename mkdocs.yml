site_name: IHC - Grupo 02
site_url: https://Interacao-Humano-Computador.github.io/2026.1-Grupo02
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo02
repo_name: 2026.1-Grupo02

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

nav:
  - Inicio: index.md
  - Planejamento:
      - Cronograma: Planejamento/cronograma.md
      - Ferramentas: Planejamento/ferramentas.md
  - Reuniões: 
      - Atas: Reunioes/Ata Reunião 09 04 26.md
