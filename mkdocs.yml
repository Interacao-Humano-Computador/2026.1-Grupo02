markdown_extensions:
  - md_in_html
site_name: IHC - Grupo 02
site_url: https://Interacao-Humano-Computador.github.io/2026.1-Grupo02
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo02
repo_name: 2026.1-Grupo02

plugins:
  - search
  - mermaid2

theme:
  name: material
  language: pt
  logo: img/site_logo.png
  favicon: img/site_logo.png
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: light-blue
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

